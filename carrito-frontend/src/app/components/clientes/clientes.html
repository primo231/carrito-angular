<h2>Clientes</h2>

<div class="card mb-3">

  <div class="card-body">

    <div class="mb-2">

      <label>Nombre</label>

      <input
        type="text"
        class="form-control"
        [(ngModel)]="cliente.nombre">

    </div>

    <div class="mb-2">

      <label>Correo</label>

      <input
        type="email"
        class="form-control"
        [(ngModel)]="cliente.correo">

    </div>

    <div class="mb-2">

      <label>Teléfono</label>

      <input
        type="text"
        class="form-control"
        [(ngModel)]="cliente.telefono">

    </div>

    <button
      *ngIf="!editando"
      class="btn btn-success"
      (click)="guardarCliente()">

      Guardar

    </button>

    <button
      *ngIf="editando"
      class="btn btn-warning"
      (click)="actualizarCliente()">

      Actualizar

    </button>

  </div>

</div>

<table class="table table-bordered">

  <thead>

    <tr>

      <th>ID</th>
      <th>Nombre</th>
      <th>Correo</th>
      <th>Teléfono</th>
      <th>Acciones</th>

    </tr>

  </thead>

  <tbody>

    <tr *ngFor="let cliente of clientes">

      <td>{{ cliente.id }}</td>
      <td>{{ cliente.nombre }}</td>
      <td>{{ cliente.correo }}</td>
      <td>{{ cliente.telefono }}</td>

      <td>

        <button
          class="btn btn-warning btn-sm me-2"
          (click)="editar(cliente)">

          Editar

        </button>

        <button
          class="btn btn-danger btn-sm"
          (click)="eliminar(cliente.id)">

          Eliminar

        </button>

      </td>

    </tr>

  </tbody>

</table>
